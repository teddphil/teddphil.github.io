<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="teddy.css">
  <meta charset="utf-8">
  <title>Teddy Zhao</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>
<body>
  <div id="content">Loading…</div>
</body>
<footer>
  <center>
    <br><br>
    <p class="attr">Copyright © 2026 <a href="index.html">Teddy Zhao</a></p>
    <p class="attr">Integrity, Autonomy, Analytical Rigour.</p>
    <p class="attr">All rights reserved.</p>
    <br>
  </center>
</footer>
<script>
  (async () => {
    const params = new URLSearchParams(window.location.search);
    const page = params.get('page');

    let mdFile;
    if (!page) {
      mdFile = 'home.md';
    } else if (/^[\w\-]+$/.test(page)) {
      mdFile = `pages/${page}.md`;
    } else {
      document.getElementById('content').textContent = 'Invalid page.';
      return;
    }

    try {
      const res = await fetch(mdFile);
      if (!res.ok) throw new Error(`${res.status}`);
      const md = await res.text();
      document.getElementById('content').innerHTML = marked.parse(md);

      const h1 = document.querySelector('#content h1');
      if (h1) document.title = `${h1.textContent} — Teddy Zhao`;
    } catch (e) {
      document.getElementById('content').textContent =
        `Could not load "${mdFile}". Make sure the file exists.`;
    }
  })();
</script>
</html>
